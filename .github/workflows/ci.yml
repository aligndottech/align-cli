name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Job name MUST stay "test" - main's branch protection requires the "test" context.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test + coverage (enforces thresholds)
        run: npm run test:coverage

      - name: Build
        run: npm run build

  # Cross-platform: prove a fresh install (native deps build/prebuild), tests
  # (exercise better-sqlite3 + the local DB), build, and the CLI binary all run on
  # Windows + macOS. Kept separate so the required "test" context stays ubuntu-only.
  cross-platform:
    strategy:
      fail-fast: false
      matrix:
        # Pin Windows to 2022: `better-sqlite3` ships no win32 prebuild for this
        # Node ABI, so `npm ci` compiles it via node-gyp - and node-gyp (bundled
        # with Node 20) cannot detect the newer Visual Studio on `windows-latest`
        # ("unknown version undefined at ...Visual Studio\18"). windows-2022 has
        # a VS 2022 node-gyp recognises, so the native build succeeds.
        os: [windows-2022, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Smoke - CLI binary runs
        run: node dist/index.js --version

  # Same gate on Node 22 (not a required context, runs for coverage of the newer runtime).
  test-node22:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test + coverage (enforces thresholds)
        run: npm run test:coverage

      - name: Build
        run: npm run build
